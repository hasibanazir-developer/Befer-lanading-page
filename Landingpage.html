<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>befer.co</title>

<link rel="stylesheet" href="style.css" />

<!-- Font Awesome for icons -->
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>

<link
  href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
  rel="stylesheet"
/>
</head>
<body>
<div class="main">
  <div class="home">
    <!-- NAVBAR -->
    <nav>
      <div class="logo">
        <img src="https://befer.co/logomain.svg" alt="Befer Logo" />
      </div>

      <div class="nav-links">
        <div>Home</div>
        <div>Features</div>
        <div>How it works</div>
        <div>Who is it for?</div>
        <div>FAQ's</div>
      </div>

      <div class="nav-buttons">
        <button class="login">Login</button>
        <button class="pro">Try Pro Free</button>
      </div>
    </nav>

    <!-- HERO CONTENT -->
    <div class="hero">
      <!-- LEFT COLUMN -->
      <div class="left-column">
        <div class="customer-box">
          <div class="customer-text">Customer</div>
          <span class="percent icon">
            <i class="fa-solid fa-percent"></i>
          </span>
        </div>

        <h1 class="hero-heading professional-line">
          Professional Tools for Trusted Service Providers.
        </h1>

        <div class="features-left-row">
          <button class="feature reliability">Reliability</button>
          <button class="feature customer">Customer Satisfaction</button>
          <button class="feature efficiency">Efficiency</button>
        </div>
      </div>

      <!-- CENTER IMAGE -->
      <div class="center-image">
        <img
          src="https://befer.co/_next/image?url=%2Fheroperson-optimized-1200w.webp&w=384&q=75"
          alt="Hero Image"
        />
      </div>

      <!-- RIGHT COLUMN -->
      <div class="right-column">
        <div class="growth-box">
          <span class="dollar icon">
            <i class="fa-solid fa-dollar-sign"></i>
          </span>
          <div class="growth">Growth</div>
        </div>

        <button class="cta-btn">Start your Business →</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
